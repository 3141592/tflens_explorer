commands:
  - name: help
    aliases: ["?"]
    handler: cli.core_handlers.handle_help
    description: Show available commands.

  - name: commands
    aliases: ["ls"]
    handler: cli.core_handlers.handle_commands
    description: List registered commands.

  - name: quit
    aliases: ["exit", "q"]
    handler: cli.core_handlers.handle_quit
    description: Exit the CLI.

  - name: clear
    aliases: ["c"]
    handler: cli.core_handlers.handle_clear
    description: Clear the terminal.

  - name: session-clear
    aliases: []
    handler: cli.core_handlers.handle_session_clear
    description: Clears the context.sessions object.

  - name: context-show
    aliases: []
    handler: cli.core_handlers.handle_show_context
    description: Shows the contents of the current context.

  - name: prompt-set
    aliases: []
    handler: handlers.prompt_handlers.handle_prompt_set
    description: Store the current prompt text.

  - name: prompt-show
    aliases: []
    handler: handlers.prompt_handlers.handle_prompt_show
    description: Show the current prompt text.

  - name: prompt-run
    aliases: []
    handler: handlers.prompt_handlers.handle_prompt_run
    description:  Run inference on the current prompt text. Ex. > prompt-run new_tokens=25

  - name: model-list
    aliases: []
    handler: handlers.model_handlers.handle_model_list
    description: List all models supported by TransformerLens.

  - name: model-aliases
    aliases:
        - model-alias
    handler: handlers.model_handlers.handle_model_aliases
    description: List configured local model aliases.

  - name: model-cache
    aliases: []
    handler: handlers.model_handlers.handle_model_cache
    description: List models currently stored in the local Hugging Face cache.

  - name: model-load
    aliases: []
    handler: handlers.model_handlers.handle_model_load
    description: Load a model into the current session.

  - name: model-load-quantized
    aliases: []
    handler: handlers.model_handlers.handle_model_load_quantized
    description: Load a quantized model into the current session.

  - name: model-info
    aliases: []
    handler: handlers.model_handlers.handle_model_info
    description: Show information about the currently loaded model.

  - name: model-show
    aliases: []
    handler: handlers.model_handlers.handle_model_show
    description: Show architecture of the currently loaded model.

  - name: tokens
    aliases: []
    handler: handlers.token_handlers.handle_tokens
    description: Show information about the tokenized prompt. 

  - name: token-decode
    aliases: []
    handler: handlers.token_handlers.handle_token_decode
    description: Decode a single token. 

  - name: token-encode
    aliases: []
    handler: handlers.token_handlers.handle_token_encode
    description: Encode strings. 

  - name: token-next
    aliases: []
    handler: handlers.token_handlers.handle_token_next
    description: Adds the next predicted token to the prompt. 

  - name: embedding-similarity
    aliases: ["embedding-cos", "embedding-sim", "cos-sim"]
    handler: handlers.token_handlers.handle_embedding_similarity
    description: Calculates the cosine similarity of two tokens. 

  - name: logits
    aliases: []
    handler: handlers.token_handlers.handle_logits
    description: Show the final position logits. 

  - name: logits-for
    aliases: []
    handler: handlers.token_handlers.handle_logits_for
    description: Show the final position logits for text or token, logits-for \"text\" or integer. 

  - name: cache-run
    aliases: []
    handler: handlers.cache_handlers.handle_cache_run
    description: Runs the current prompt through the model with cache and stores cache in the session state. 

  - name: cache-show
    aliases: []
    handler: handlers.cache_handlers.handle_cache_show
    description: Shows information about the cache. 

  - name: cache-keys
    aliases: []
    handler: handlers.cache_handlers.handle_cache_keys
    description: Shows information about the cache. 

  - name: cache-layer
    aliases: []
    handler: handlers.cache_handlers.handle_cache_layer
    description: Shows available tensors for one layer. 

  - name: cache-tensor
    aliases: []
    handler: handlers.cache_handlers.handle_cache_tensor
    description: Shows information about tensor <name>. 

  - name: eval-run
    aliases: []
    handler: handlers.eval_handlers.handle_eval_run
    description: Runs model evaluations defined in the evals.yml. 

  - name: eval-summary
    aliases: []
    handler: handlers.eval_handlers.handle_eval_summary
    description: Runs model evaluations defined in the evals.yml and prints just the summary. 

  - name: snapshot-create
    aliases: []
    handler: handlers.compare_handlers.handle_snapshot_create
    description: Creates a snapshot YAML file for comparisons. 

  - name: snapshots-list
    aliases: []
    handler: handlers.compare_handlers.handle_snapshots_list
    description: List available snapshot YAML files. 

  - name: compare-runs
    aliases: []
    handler: handlers.compare_handlers.handle_compare_runs
    description: Runs a general compare of two snapshots. 

  - name: compare-mlp
    aliases: []
    handler: handlers.compare_handlers.handle_compare_mlp
    description: Compare mlp values of two models. 

  - name: compare-attention
    aliases: []
    handler: handlers.compare_handlers.handle_compare_attention
    description: Compare attention values of two models. 

  - name: compare-generated
    aliases: []
    handler: handlers.compare_handlers.handle_compare_generated
    description: Compare generated values of two models. 

  - name: compare-evals
    aliases: []
    handler: handlers.compare_handlers.handle_compare_evals
    description: Compare evals of two models. 

  - name: compare-tokens
    aliases: []
    handler: handlers.compare_handlers.handle_compare_tokens
    description: Compare tokens of two models. 

  - name: compare-logits
    aliases: []
    handler: handlers.compare_handlers.handle_compare_logits
    description: Compare logits of two models. 

  - name: compare-cache
    aliases: []
    handler: handlers.compare_handlers.handle_compare_cache
    description: Compare cache of two models. 

  - name: compare-models
    aliases: []
    handler: handlers.compare_handlers.handle_compare_models
    description: Compare two models. 



