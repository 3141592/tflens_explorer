commands:
  - name: help
    aliases: ["?"]
    handler: builtin.help
    description: Show available commands.

  - name: commands
    aliases: ["ls"]
    handler: builtin.commands
    description: List registered commands.

  - name: quit
    aliases: ["exit", "q"]
    handler: builtin.quit
    description: Exit the CLI.

  - name: prompt-set
    aliases: []
    handler: builtin.prompt_set
    description: Store the current prompt text.

  - name: prompt-show
    aliases: []
    handler: builtin.prompt_show
    description: Show the current prompt text.

  - name: prompt-run
    aliases: []
    handler: builtin.prompt_run
    description:  Run inference on the current prompt text. Ex. > prompt-run new_tokens=25

  - name: model-list
    aliases: []
    handler: builtin.model_list
    description: List all models supported by TransformerLens.

  - name: model-load
    aliases: []
    handler: builtin.model_load
    description: Load a model into the current session.

  - name: model-info
    aliases: []
    handler: builtin.model_info
    description: Show information about the currently loaded model.

  - name: tokens
    aliases: []
    handler: builtin.tokens
    description: Show information about the tokenized prompt. 

  - name: logits
    aliases: []
    handler: builtin.logits
    description: Show the final position logits. 

  - name: cache-run
    aliases: []
    handler: builtin.cache_run
    description: Runs the current prompt through the model with cache and stores cache in the session state. 



